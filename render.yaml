# render.yaml — Secretario IA v3.0
# Deploy config for Render.com

services:
  - type: web
    name: secretario-ia
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: secretario-ia-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: Secretario IA
      - key: APP_URL
        sync: false

databases:
  - name: secretario-ia-db
    plan: free
    databaseName: secretario_ia
    user: secretario_ia_user
