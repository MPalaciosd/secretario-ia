<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secretario IA — Tu Agenda Inteligente</title>

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #F0EBE4;
      color: #3D0C0C;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100vh;
      width: 100vw;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Scrollbar elegante */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.35); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.6); }

    /* Animaciones */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }

    /* Input/select base */
    input, select, textarea, button {
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #8B1A1A !important;
      box-shadow: 0 0 0 2px rgba(139,26,26,0.12);
    }

    /* Hover en celdas del calendario */
    .cal-cell:hover {
      box-shadow: 0 2px 10px rgba(61,12,12,0.12);
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="/app.js" type="text/babel"></script>
</body>
</html>
