<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secretario IA — Tu Agenda Inteligente</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FAF7F4',
            sidebar: '#1E0A0A',
            wine: '#3D0C0C',
            accent: '#8B1A1A',
            gold: '#C9A96E',
          },
          boxShadow: {
            premium: '0 4px 24px rgba(61,12,12,0.10)',
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      .gradient-accent { @apply bg-gradient-to-br from-[#8B1A1A] to-[#5C0F0F]; }
      .gradient-wine { @apply bg-gradient-to-br from-[#1E0A0A] to-[#2D1010]; }
      .gold-divider { @apply h-[1px] bg-gradient-to-r from-transparent via-[#C9A96E]/30 to-transparent; }
    }
    body { background-color: #FAF7F4; font-family: 'Inter', sans-serif; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script src="app.js" type="text/babel"></script>
</body>
</html>
