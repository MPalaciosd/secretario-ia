<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Secretario IA — Tu Agenda Inteligente</title>

  <!-- PWA Meta Tags -->
  <meta name="application-name" content="Secretario IA">
  <meta name="description" content="Tu agenda inteligente con IA. Gestiona eventos, chatea con IA y mucho mas.">
  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Secretario IA">
  <meta name="msapplication-TileColor" content="#7c3aed">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon.svg">
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">

  <!-- Apple Splash Screens -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Secretario IA">
  <meta property="og:description" content="Tu agenda inteligente con IA">
  <meta property="og:image" content="/icons/icon.svg">

  <style>
    /* PWA install banner styles */
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #7c3aed;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      z-index: 9999;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 90vw;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    #pwa-install-banner button {
      background: white;
      color: #7c3aed;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }
    #pwa-dismiss-btn {
      background: transparent !important;
      color: rgba(255,255,255,0.7) !important;
      padding: 4px 8px !important;
      font-size: 18px !important;
    }
    #pwa-status-toast {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      z-index: 9999;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(16,185,129,0.3);
    }
    /* Safe area for iPhone notch */
    body { padding-top: env(safe-area-inset-top); }
  </style>
</head>
<body>
  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" style="display:none">
    <span>📱 Instalar Secretario IA</span>
    <button id="pwa-install-btn">Instalar</button>
    <button id="pwa-dismiss-btn">✕</button>
  </div>

  <!-- Success Toast -->
  <div id="pwa-status-toast">✅ App instalada correctamente</div>

  <!-- All existing app content is loaded by app.js -->
  <div id="app-root"></div>

  <!-- Existing app scripts -->
  <script src="/app.js"></script>

  <!-- PWA Registration Script -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.log('[PWA] Service Worker registrado:', reg.scope);
        } catch (err) {
          console.warn('[PWA] SW registration failed:', err);
        }
      });
    }

    // PWA Install prompt
    let deferredPrompt;
    const banner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');
    const toast = document.getElementById('pwa-status-toast');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show banner after 3 seconds
      setTimeout(() => {
        if (banner) banner.style.display = 'flex';
      }, 3000);
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          if (toast) { toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 3000); }
        }
        deferredPrompt = null;
        if (banner) banner.style.display = 'none';
      });
    }

    if (dismissBtn) {
      dismissBtn.addEventListener('click', () => {
        if (banner) banner.style.display = 'none';
      });
    }

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App instalada!');
      if (banner) banner.style.display = 'none';
    });

    // Detect if running as installed PWA
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      document.documentElement.classList.add('pwa-mode');
      console.log('[PWA] Ejecutando como app instalada');
    }
  </script>
</body>
</html>
