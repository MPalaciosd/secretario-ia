<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Secretario IA — Tu Agenda Inteligente</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="Tu agenda inteligente con IA. Gestiona eventos, chatea con tu asistente y gestiona tus suscripciones.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Secretario IA">
  <meta name="application-name" content="Secretario IA">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icons -->h
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">

  <!-- React & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <style>
    /* Safe area for iPhone notch/Dynamic Island */
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);
    }
    body {
      margin: 0;
      padding-top: var(--sat);
      padding-bottom: var(--sab);
    }
    /* PWA Install Banner */
    #pwa-banner {
      display: none;
      position: fixed;
      bottom: calc(20px + var(--sab));
      left: 50%;
      transform: translateX(-50%);
      background: #7c3aed;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      z-index: 99999;
      box-shadow: 0 4px 24px rgba(124,58,237,0.5);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      align-items: center;
      gap: 12px;
      max-width: 90vw;
    }
    #pwa-banner button {
      background: white;
      color: #7c3aed;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    #pwa-dismiss {
      background: transparent !important;
      color: rgba(255,255,255,0.6) !important;
      font-size: 16px !important;
      padding: 4px 6px !important;
    }
  </style>
</head>
<body>
  <!-- PWA Install Banner -->
  <div id="pwa-banner">
    <span>📱 Instalar Secretario IA</span>
    <button id="pwa-install-btn">Instalar</button>
    <button id="pwa-dismiss">✕</button>
  </div>

  <!-- App Root - same as original -->
  <div id="app"></div>

  <!-- Main App Script -->
  <script type="text/babel" src="/app.js"></script>

  <!-- PWA Service Worker & Install Logic -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
          .catch(function(e) { console.warn('[SW] Failed:', e); });
      });
    }

    // Install prompt
    var deferredPrompt = null;
    var banner = document.getElementById('pwa-banner');
    var installBtn = document.getElementById('pwa-install-btn');
    var dismissBtn = document.getElementById('pwa-dismiss');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(function() {
        if (banner) banner.style.display = 'flex';
      }, 4000);
    });

    if (installBtn) {
      installBtn.onclick = function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if (result.outcome === 'accepted') {
            console.log('[PWA] Instalado!');
          }
          deferredPrompt = null;
          if (banner) banner.style.display = 'none';
        });
      };
    }

    if (dismissBtn) {
      dismissBtn.onclick = function() {
        if (banner) banner.style.display = 'none';
      };
    }

    window.addEventListener('appinstalled', function() {
      if (banner) banner.style.display = 'none';
      console.log('[PWA] App instalada correctamente');
    });
  </script>
</body>
</html>
