<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — pop BOT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    nav { padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    nav .logo { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    nav a { color: #aaa; text-decoration: none; margin-left: 24px; font-size: 14px; }

    .page { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 32px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 14px; padding: 24px; }
    .card-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .card-value { font-size: 36px; font-weight: 800; }
    .card-value.credits { background: linear-gradient(135deg, #667eea, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-sub { font-size: 13px; color: #888; margin-top: 4px; }

    .plan-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .plan-free { background: #2a2a3a; color: #888; }
    .plan-basic { background: #1a3a4a; color: #4ecdc4; }
    .plan-pro { background: #2a1a4a; color: #a78bfa; }
    .plan-enterprise { background: #3a2a1a; color: #f6c90e; }

    .section { margin-bottom: 32px; }
    .section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

    /* Progress bar de créditos */
    .credits-bar { background: #2a2a3a; border-radius: 8px; height: 10px; overflow: hidden; margin-top: 12px; }
    .credits-fill { height: 100%; background: linear-gradient(90deg, #667eea, #a78bfa); border-radius: 8px; transition: width 0.5s; }

    /* Botón ver anuncio */
    .ad-btn { display: flex; align-items: center; gap: 12px; background: #16161f; border: 1px dashed #667eea; border-radius: 12px; padding: 20px 24px; cursor: pointer; width: 100%; text-align: left; color: #fff; font-size: 15px; transition: border-style 0.2s, background 0.2s; }
    .ad-btn:hover { background: #1e1e2e; border-style: solid; }
    .ad-btn .icon { font-size: 28px; }
    .ad-btn .desc { color: #888; font-size: 13px; }

    /* Tabla historial */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th { text-align: left; padding: 10px 12px; font-size: 12px; color: #666; text-transform: uppercase; border-bottom: 1px solid #2a2a3a; }
    .history-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #1e1e2e; }
    .status-ok { color: #27ae60; }
    .status-fail { color: #e74c3c; }

    .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; text-decoration: none; transition: opacity 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid #667eea; color: #667eea; }
    .btn-outline:hover { background: #667eea22; }

    .empty { color: #555; text-align: center; padding: 32px; }

    #toast { position: fixed; bottom: 24px; right: 24px; background: #27ae60; color: #fff; padding: 14px 20px; border-radius: 10px; display: none; font-size: 14px; z-index: 999; }
    .loading { color: #555; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">pop BOT</div>
    <div>
      <a href="/">Chat</a>
      <a href="/pricing">Planes</a>
    </div>
  </nav>

  <div class="page">
    <h1>Mi Dashboard</h1>

    <!-- Tarjetas resumen -->
    <div class="grid">
      <div class="card">
        <div class="card-label">Créditos disponibles</div>
        <div class="card-value credits" id="balance">—</div>
        <div id="credits-bar-container" style="display:none">
          <div class="credits-bar"><div class="credits-fill" id="credits-fill" style="width:0%"></div></div>
          <div class="card-sub" id="credits-sub"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Plan activo</div>
        <div class="card-value" style="font-size:22px;margin-top:8px">
          <span class="plan-badge plan-free" id="plan-badge">—</span>
        </div>
        <div class="card-sub" id="plan-status"></div>
      </div>

      <div class="card">
        <div class="card-label">Total consumido</div>
        <div class="card-value" id="total-consumed" style="font-size:28px;color:#888">—</div>
        <div class="card-sub">créditos en total</div>
      </div>
    </div>

    <!-- Acciones de suscripción -->
    <div class="section">
      <h2>Suscripción</h2>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="/pricing" class="btn btn-primary">Cambiar plan</a>
        <button class="btn btn-outline" id="portal-btn" onclick="openPortal()">Gestionar suscripción</button>
      </div>
    </div>

    <!-- Anuncio para usuarios free -->
    <div class="section" id="ad-section" style="display:none">
      <h2>Ganar créditos gratis</h2>
      <button class="ad-btn" onclick="watchAd()">
        <span class="icon">▶️</span>
        <div>
          <div><strong>Ver anuncio → +5 créditos</strong></div>
          <div class="desc" id="ad-remaining">Cargando...</div>
        </div>
      </button>
    </div>

    <!-- Historial de pagos -->
    <div class="section">
      <h2>Historial de pagos</h2>
      <div id="history-container">
        <div class="loading">Cargando...</div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const PLAN_CREDITS = { free: 0, basic: 500, pro: 2000, enterprise: 10000 };
    let currentPlan = 'free';
    let adRemaining = 10;

    function getClientId() {
      let id = localStorage.getItem('popbot_client_id');
      if (!id) {
        id = 'guest_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('popbot_client_id', id);
      }
      return id;
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#c0392b' : '#27ae60';
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3500);
    }

    async function loadCredits() {
      const clientId = getClientId();
      try {
        const res = await fetch(`/api/credits/${clientId}`);
        const data = await res.json();
        currentPlan = data.plan;

        // Balance
        document.getElementById('balance').textContent = data.balance.toLocaleString();
        document.getElementById('total-consumed').textContent = data.total_consumed.toLocaleString();

        // Plan badge
        const badge = document.getElementById('plan-badge');
        badge.textContent = data.plan.charAt(0).toUpperCase() + data.plan.slice(1);
        badge.className = `plan-badge plan-${data.plan}`;
        document.getElementById('plan-status').textContent = `Estado: ${data.subscription_status}`;

        // Barra de créditos (solo planes de pago)
        if (data.plan !== 'free') {
          const max = PLAN_CREDITS[data.plan] || 1;
          const pct = Math.min(100, (data.balance / max) * 100).toFixed(0);
          document.getElementById('credits-bar-container').style.display = 'block';
          document.getElementById('credits-fill').style.width = pct + '%';
          document.getElementById('credits-sub').textContent = `${pct}% del plan mensual`;
        }

        // Sección de anuncios solo para free
        if (data.plan === 'free') {
          document.getElementById('ad-section').style.display = 'block';
        }
      } catch (err) {
        console.error('Error cargando créditos:', err);
      }
    }

    async function loadHistory() {
      const clientId = getClientId();
      try {
        const res = await fetch(`/api/credits/${clientId}/history`);
        const data = await res.json();
        const container = document.getElementById('history-container');

        if (!data.history || data.history.length === 0) {
          container.innerHTML = '<div class="empty">Sin pagos registrados aún.</div>';
          return;
        }

        const rows = data.history.map(p => `
          <tr>
            <td>${new Date(p.createdAt).toLocaleDateString('es-ES')}</td>
            <td>${p.description || '—'}</td>
            <td>$${(p.amount / 100).toFixed(2)}</td>
            <td class="${p.status === 'succeeded' ? 'status-ok' : 'status-fail'}">${p.status === 'succeeded' ? 'Pagado' : 'Fallido'}</td>
          </tr>
        `).join('');

        container.innerHTML = `
          <table class="history-table">
            <thead><tr><th>Fecha</th><th>Descripción</th><th>Importe</th><th>Estado</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (err) {
        document.getElementById('history-container').innerHTML = '<div class="empty">Error al cargar el historial.</div>';
      }
    }

    async function watchAd() {
      // Simular visionado de anuncio (en prod integrar AdSense Rewarded)
      showToast('Viendo anuncio...');
      await new Promise(r => setTimeout(r, 2000));

      const clientId = getClientId();
      try {
        const res = await fetch(`/api/credits/${clientId}/ad-reward`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          showToast(`+${data.credits_awarded} créditos añadidos! Saldo: ${data.balance}`);
          adRemaining = data.remaining_today;
          document.getElementById('ad-remaining').textContent =
            `Puedes ver ${data.remaining_today} anuncios más hoy`;
          await loadCredits();
        } else {
          showToast(data.error || 'Error al procesar la recompensa.', true);
        }
      } catch (err) {
        showToast('Error de conexión.', true);
      }
    }

    async function openPortal() {
      const clientId = getClientId();
      try {
        const res = await fetch('/api/stripe/portal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clientId }),
        });
        const data = await res.json();
        if (data.url) window.open(data.url, '_blank');
        else showToast(data.error || 'Sin suscripción activa.', true);
      } catch (err) {
        showToast('Error de conexión.', true);
      }
    }

    // Manejar sesión exitosa de Stripe
    const params = new URLSearchParams(window.location.search);
    if (params.get('session_id')) {
      showToast('¡Suscripción activada! Bienvenido/a.');
      window.history.replaceState({}, '', '/dashboard');
    }

    // Init
    loadCredits();
    loadHistory();
  </script>
</body>
</html>
